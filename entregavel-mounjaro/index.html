<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Protocolo Gelatina - Portal do Aluno</title>
    
    <!-- Google Fonts: Montserrat for headings, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Hero Background (Large Gradient) -->
        <div class="hero-bg-container"></div>

        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <span class="greeting" id="page-greeting">Olá, Amiga!</span>
                <h1 id="page-title">Dashboard</h1>
            </div>
            <div class="avatar-circle" id="header-avatar">✨</div>
        </header>

        <!-- Main Content Area -->
        <main id="app-main">
            <!-- Dynamic content injected here -->
        </main>

        <!-- Sticky IA Button -->
        <button class="sticky-ia-button" onclick="alert('Nutri IA em breve!')">
            <i data-lucide="message-circle"></i>
        </button>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="home">
                <i data-lucide="home"></i>
                <span>Início</span>
            </button>
            <button class="nav-item" data-tab="content">
                <i data-lucide="book-open"></i>
                <span>Conteúdo</span>
            </button>
            <button class="nav-item" data-tab="progress">
                <i data-lucide="bar-chart-2"></i>
                <span>Progresso</span>
            </button>
            <button class="nav-item" data-tab="tools">
                <i data-lucide="search"></i>
                <span>Ferramentas</span>
            </button>
            <button class="nav-item" data-tab="profile">
                <i data-lucide="user"></i>
                <span>Perfil</span>
            </button>
        </nav>
    </div>

    <!-- App Logic -->
    <script src="app.js?v=v2_bonus"></script>
</body>
</html>
